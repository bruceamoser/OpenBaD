syntax = "proto3";
package openbad;

import "common.proto";

// Published on: agent/cognitive/escalation
message EscalationRequest {
  Header header = 1;
  string event_topic = 2;           // Topic of the original event.
  bytes  event_payload = 3;         // Original event payload.
  string reason = 4;                // Why the reflex arc couldn't handle it.
  Priority priority = 5;
  string reflex_id = 6;             // Which reflex escalated.
}

// Published on: agent/cognitive/result
message CognitiveResult {
  Header header = 1;
  string correlation_id = 2;        // Links back to the escalation request.
  string decision = 3;              // Human-readable summary.
  bytes  action_payload = 4;        // Structured action for downstream consumers.
  string model_used = 5;            // "slm" / "llm" / model identifier.
  uint64 tokens_consumed = 6;
}

// Published on: agent/cognitive/request
message ReasoningRequest {
  Header header = 1;
  string prompt = 2;                // The reasoning prompt.
  uint32 context_tokens = 3;        // Number of context tokens available.
  Priority priority = 4;            // Reasoning priority level.
  string preferred_provider = 5;    // Preferred provider (e.g. "ollama", "openai").
  uint32 max_tokens = 6;            // Maximum response tokens.
}

// Published on: agent/cognitive/response
message ReasoningResponse {
  Header header = 1;
  string content = 2;               // Generated reasoning content.
  string model_used = 3;            // Model identifier used.
  string provider = 4;              // Provider name.
  uint32 tokens_used = 5;           // Actual tokens consumed.
  double latency_ms = 6;            // Inference latency in milliseconds.
  string reasoning_trace = 7;       // Optional chain-of-thought trace.
}

// Published on: agent/cognitive/health
message ModelHealthStatus {
  Header header = 1;
  string provider = 2;              // Provider name.
  string model_id = 3;              // Model identifier.
  bool   available = 4;             // Whether the model is reachable.
  double latency_p50 = 5;           // Median latency in milliseconds.
  double latency_p99 = 6;           // 99th percentile latency.
}
