# Build and publish a GitHub release with pre-downloaded dependency wheels.
#
# Trigger: push a tag like v0.2.2.  The workflow:
#   1. Builds the openbad wheel.
#   2. Downloads all dependency wheels for the target platform.
#   3. Bundles everything into openbad-<version>-wheels.tar.gz.
#   4. Creates a GitHub release with the tarball attached.
#
# Consumers run:  sudo openbad update --deps
# which fetches the tarball and installs from local wheels — no PyPI.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build openbad wheel
        run: |
          pip install --upgrade pip build
          python -m build --wheel --outdir dist/

      - name: Download dependency wheels
        run: |
          mkdir -p wheels/
          # Copy the openbad wheel into the wheels bundle
          cp dist/*.whl wheels/
          # Download all runtime dependency wheels (linux x86_64)
          pip download \
            --dest wheels/ \
            --only-binary=:all: \
            --python-version 3.12 \
            --platform manylinux2014_x86_64 \
            --platform linux_x86_64 \
            --abi cp312 \
            . 2>&1 || true
          # Also grab pure-python wheels that --platform might miss
          pip download \
            --dest wheels/ \
            --only-binary=:all: \
            --no-deps \
            . 2>&1 || true
          # Deduplicate: keep the newest version of each package
          echo "Wheels collected: $(ls wheels/*.whl 2>/dev/null | wc -l)"
          ls -lh wheels/

      - name: Create wheels tarball
        run: |
          tar czf "openbad-${{ steps.version.outputs.version }}-wheels.tar.gz" -C wheels .
          ls -lh openbad-*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            openbad-${{ steps.version.outputs.version }}-wheels.tar.gz
            dist/*.whl
