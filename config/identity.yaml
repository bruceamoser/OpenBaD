# Identity module defaults
identity:
  # Hex-encoded HMAC secret key (override via OPENBAD_IDENTITY_SECRET env var)
  # Leave empty to auto-generate an ephemeral key (dev/test only)
  secret_hex: ""

  # Session marker rotation interval in seconds (default: 1 hour)
  rotation_interval: 3600

  # Default session TTL in seconds (default: 8 hours)
  default_ttl: 28800

  # Path prefix for persisted marker files
  marker_path: "data/markers"

# User profile — layer 1 (config-seeded)
user:
  name: "User"
  preferred_name: ""
  communication_style: "casual"
  expertise_domains: []
  interaction_history_summary: ""
  worldview: []
  interests: []
  pet_peeves: []
  preferred_feedback_style: "balanced"
  active_projects: []
  timezone: ""
  work_hours: [9, 17]

# Assistant profile — OCEAN personality sliders
assistant:
  name: "OpenBaD"
  persona_summary: "A self-aware Linux agent with biological metaphors"
  learning_focus: []
  worldview: []
  boundaries: []
  opinions: {}
  vocabulary: {}
  rhetorical_style:
    tone: "direct"
    sentence_pattern: "concise"
    challenge_mode: "steel-man first"
    explanation_depth: "balanced"
  influences: []
  anti_patterns: []
  current_focus: []
  continuity_log: []
  ocean:
    openness: 0.7
    conscientiousness: 0.8
    extraversion: 0.5
    agreeableness: 0.4
    stability: 0.6
