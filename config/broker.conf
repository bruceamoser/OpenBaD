# OpenBaD NanoMQ Broker Configuration
# See: https://nanomq.io/docs/latest/config-description/broker.html

# Listener
listeners.tcp {
    bind = "0.0.0.0:1883"
}

# MQTT protocol settings
mqtt {
    max_packet_size = 1MB
    max_mqueue_len = 2048
    retry_interval = 10s
    keepalive_multiplier = 1.25
    property_size = 32
    max_topic_alias = 10
    receive_max = 65535
}

# Logging
log {
    to = [file, console]
    level = warn
    dir = "/var/log/nanomq"
    file = "nanomq.log"
    rotation {
        size = 10MB
        count = 5
    }
}

# Authorization - default allow for local development
# Phase 3 will add HTTP auth plugin for production ACL
authorization {
    no_match = allow
    cache {
        max_size = 32
        ttl = 1m
    }
}
