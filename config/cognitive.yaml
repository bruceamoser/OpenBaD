cognitive:
  enabled: true
  default_provider: ""
  providers: []
  # Assigned provider/model per cognitive system.
  systems:
    chat:
      provider: anthropic
      model: claude-sonnet-4
    reasoning:
      provider: anthropic
      model: claude-opus-4
    reactions:
      provider: ollama
      model: bonsai-8b
    sleep:
      provider: ollama
      model: bonsai-8b
  # Embedding configuration for Library & SemanticMemory
  embedding:
    provider: ollama
    model: nomic-embed-text
    dimensions: 768
  # Shared fallback chain used when the assigned system provider is unavailable.
  default_fallback_chain:
    - provider: ollama
      model: bonsai-8b
    - provider: ollama
      model: llama3.2
  fallback_cortisol:
    release_per_step: 0.1
    escalation_after: 5
  # Intrinsic systems do not route through external model assignments:
  # - Instincts / FSM
  # - Memory (Valkey + Chroma)
  # - Immune / Interceptor
  context_budget:
    slm_max_tokens: 8192
    llm_max_tokens: 32768
    reserved_system_tokens: 512
  reasoning:
    default_max_tokens: 2048
    default_temperature: 0.7
    critical_timeout_ms: 30000
    high_timeout_ms: 15000
    medium_timeout_ms: 10000
    low_timeout_ms: 5000

  # ── Framework integration (LangChain / LangGraph / CrewAI) ──
  frameworks:
    crews:
      user_facing:
        verbose: false
        max_iterations: 10
        allow_delegation: true
      internal:
        verbose: false
        max_iterations: 15
        allow_delegation: false
      maintenance:
        verbose: false
        max_iterations: 20
        allow_delegation: true

    langgraph:
      checkpoint_format: json
      checkpoint_retention_hours: 168  # 7 days

    agents:
      chat:
        priority: medium
      task:
        priority: medium
      research:
        priority: low
      doctor:
        priority: critical
      sleep:
        priority: low
      immune:
        priority: high
      explorer:
        priority: low
