cognitive:
  enabled: true
  default_provider: ""
  providers: []
  # Assigned provider/model per cognitive system.
  systems:
    chat:
      provider: anthropic
      model: claude-sonnet-4
    reasoning:
      provider: anthropic
      model: claude-opus-4
    reactions:
      provider: ollama
      model: bonsai-8b
    sleep:
      provider: ollama
      model: bonsai-8b
  # Shared fallback chain used when the assigned system provider is unavailable.
  default_fallback_chain:
    - provider: ollama
      model: bonsai-8b
    - provider: ollama
      model: llama3.2
  fallback_cortisol:
    release_per_step: 0.1
    escalation_after: 5
  # Intrinsic systems do not route through external model assignments:
  # - Instincts / FSM
  # - Memory (Valkey + Chroma)
  # - Immune / Interceptor
  context_budget:
    slm_max_tokens: 8192
    llm_max_tokens: 32768
    reserved_system_tokens: 512
  reasoning:
    default_max_tokens: 2048
    default_temperature: 0.7
    critical_timeout_ms: 30000
    high_timeout_ms: 15000
    medium_timeout_ms: 10000
    low_timeout_ms: 5000
